name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile --production

      - name: Bundle files
        run: |
          mkdir -p staging/pulsar-core
          rsync -a --exclude='.github' --exclude='staging' . staging/pulsar-core/
          cd staging && zip -r ../pulsar-core.zip pulsar-core/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-CORE ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-CORE ${{ github.ref_name }}

            Core foundation of the Pulsar Framework — middleware, callbacks, player lifecycle, routing, and more.

            ### Installation
            1. Download `pulsar-core.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-core` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-core.zip
          prerelease: false
